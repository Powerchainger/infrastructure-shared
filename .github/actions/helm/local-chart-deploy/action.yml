name: 'Helm Deploy'
description: 'Deploy Helm chart with custom values'

inputs:
  values:
    description: 'YAML string of Helm values'
    required: true
  release:
    description: "Helm release name"
    required: true
    type: string
  chart:
    description: "Helm chart to be used"
    required: true
    type: string
  namespace:
    description: "K8s namespace to execute against"
    required: true
    type: string

runs:
  using: 'composite'
  steps:
    - name: Write YAML to file
      run: |
        cat <<'EOF' > custom-values.yaml
        ${{ inputs.values }}
        EOF
      shell: bash
      
    - name: Show custom-values.yaml
      run: |
        echo "===== custom-values.yaml ====="
        cat custom-values.yaml
      shell: bash
      
    - name: build dependencies
      run: helm dependency up ${{ inputs.chart }} 
      shell: bash
      
    - name: Render all Helm templates (debug)
      run: |
        echo "===== Rendered Helm templates ====="
        helm template ${{ inputs.chart }} \
          -f custom-values.yaml \
          --debug > rendered-all.yaml || true
        awk '
        /^# Source:/ {
          if ($0 ~ /grafana\.ya?ml/) skip=1
          else skip=0
        }
        !skip
        ' rendered-all.yaml > filtered.yaml 
    
        nl -ba filtered.yaml | sed -n '1,500p'
      shell: bash
      
    - name: Deploy Helm Chart
      run: >
        helm upgrade --install 
        ${{ inputs.release }}  
        ${{ inputs.chart }} 
        --namespace ${{ inputs.namespace }} 
        -f custom-values.yaml
      shell: bash
